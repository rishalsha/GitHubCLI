name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ghcli
            asset_name: ghcli-linux-amd64
          - os: macos-latest
            artifact_name: ghcli
            asset_name: ghcli-macos-amd64
          - os: windows-latest
            artifact_name: ghcli.exe
            asset_name: ghcli-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build project
        run: cargo build --release

      - name: Rename artifact
        shell: bash
        run: |
          mv target/release/${{ matrix.artifact_name }} target/release/${{ matrix.asset_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/${{ matrix.asset_name }}
          generate_release_notes: true
